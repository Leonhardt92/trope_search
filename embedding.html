<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>单条数据 Embedding 生成器</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --line: #e9e9e7;
      --text: #2b2b2b;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #eff6ff;
      --ok: #15803d;
      --danger: #b42318;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    textarea, input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
      background: #fff;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: #bfd3ff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 110px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .field input {
      height: 44px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .check-item {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fcfcfb;
      font-size: 14px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }

    .tip {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .row, .field-grid, .checkbox-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1>单条数据 Embedding 生成器</h1>
      <p>输入一整行 CSV，点“解析”后可以逐字段修改。再点“生成”，页面会输出两段可直接复制的 CSV：一段用于 <code>data.csv</code>，一段用于 <code>embeddings.csv</code>。</p>
    </div>

    <section class="card">
      <h2 class="section-title">1. 输入一行原始数据</h2>
      <label class="label" for="rawLine">格式：id,标题,空白模板,角色关系,人数,一句话定义,地点,禁止使用元素,自检问题,示例</label>
      <textarea id="rawLine" placeholder='2,电梯里的临时同盟,几名原本互不信任的人被困在____，必须在____之前达成合作。,临时盟友|互相提防,3-5人,用封闭空间强迫人物快速暴露真实立场。,写字楼电梯,血浆|怪物露正脸|长篇回忆杀,每个人在电梯里有没有独立的利益冲突？,https://www.youtube.com/watch?v=3JZ_D3ELwOQ'></textarea>
      <div class="btn-row" style="margin-top:12px;">
        <button class="primary" id="parseBtn">解析</button>
        <button id="fillExampleBtn">填入示例</button>
      </div>
      <div class="tip">如果某个字段本身包含英文逗号，请按标准 CSV 写法用英文双引号包起来。</div>
    </section>

    <section class="card">
      <h2 class="section-title">2. 编辑字段</h2>
      <div class="field-grid" id="fieldGrid"></div>
    </section>

    <section class="card">
      <h2 class="section-title">3. 选择要生成 embedding 的列</h2>
      <div class="checkbox-grid" id="checkboxGrid"></div>
      <div class="tip">默认只勾选：标题、空白模板、角色关系、人数、一句话定义、地点。</div>
    </section>

    <section class="card">
      <h2 class="section-title">4. 生成结果</h2>
      <div class="btn-row">
        <button class="primary" id="generateBtn">生成两个 CSV 记录</button>
        <button id="copyDataBtn">复制 data.csv 记录</button>
        <button id="copyEmbBtn">复制 embeddings.csv 记录</button>
      </div>
      <div id="status" class="status" style="margin-top:12px;">等待操作。</div>
    </section>

    <section class="card">
      <h2 class="section-title">data.csv 输出</h2>
      <textarea id="dataOutput" spellcheck="false"></textarea>
    </section>

    <section class="card">
      <h2 class="section-title">embeddings.csv 输出</h2>
      <textarea id="embOutput" spellcheck="false"></textarea>
    </section>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.0.0/+esm';

    env.allowLocalModels = false;

    const MODEL_ID = 'Xenova/bge-small-zh-v1.5';
    const COLUMNS = [
      'id',
      '标题',
      '空白模板',
      '角色关系',
      '人数',
      '一句话定义',
      '地点',
      '禁止使用元素',
      '自检问题',
      '示例',
    ];

    const DEFAULT_EMBEDDING_COLUMNS = new Set([
      '标题',
      '空白模板',
      '角色关系',
      '人数',
      '一句话定义',
      '地点',
    ]);

    let extractor = null;

    const els = {
      rawLine: document.getElementById('rawLine'),
      parseBtn: document.getElementById('parseBtn'),
      fillExampleBtn: document.getElementById('fillExampleBtn'),
      fieldGrid: document.getElementById('fieldGrid'),
      checkboxGrid: document.getElementById('checkboxGrid'),
      generateBtn: document.getElementById('generateBtn'),
      copyDataBtn: document.getElementById('copyDataBtn'),
      copyEmbBtn: document.getElementById('copyEmbBtn'),
      dataOutput: document.getElementById('dataOutput'),
      embOutput: document.getElementById('embOutput'),
      status: document.getElementById('status'),
    };

    const fieldInputs = new Map();
    const checkboxes = new Map();

    const EXAMPLE_LINE = '2,电梯里的临时同盟,几名原本互不信任的人被困在____，必须在____之前达成合作。,临时盟友|互相提防,3-5人,用封闭空间强迫人物快速暴露真实立场。,写字楼电梯,血浆|怪物露正脸|长篇回忆杀,每个人在电梯里有没有独立的利益冲突？,https://www.youtube.com/watch?v=3JZ_D3ELwOQ';

    function setStatus(text, type = 'normal') {
      els.status.textContent = text;
      els.status.className = 'status' + (type === 'ok' ? ' ok' : type === 'error' ? ' error' : '');
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        const next = line[i + 1];
        if (ch === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result;
    }

    function escapeCSV(value) {
      const s = String(value ?? '');
      if (/[",\n]/.test(s)) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    function renderFields() {
      els.fieldGrid.innerHTML = '';
      for (const col of COLUMNS) {
        const wrap = document.createElement('div');
        wrap.className = 'field' + (['空白模板', '一句话定义', '禁止使用元素', '自检问题', '示例'].includes(col) ? ' full' : '');
        const label = document.createElement('label');
        label.textContent = col;
        const input = document.createElement(col === '示例' || col === '空白模板' || col === '一句话定义' || col === '禁止使用元素' || col === '自检问题' ? 'textarea' : 'input');
        if (input.tagName === 'INPUT') input.type = 'text';
        input.value = '';
        input.rows = 3;
        wrap.appendChild(label);
        wrap.appendChild(input);
        els.fieldGrid.appendChild(wrap);
        fieldInputs.set(col, input);
      }
    }

    function renderCheckboxes() {
      els.checkboxGrid.innerHTML = '';
      for (const col of COLUMNS) {
        if (col === 'id' || col === '禁止使用元素' || col === '自检问题' || col === '示例') continue;
        const wrap = document.createElement('label');
        wrap.className = 'check-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = DEFAULT_EMBEDDING_COLUMNS.has(col);
        checkboxes.set(col, cb);
        wrap.appendChild(cb);
        wrap.appendChild(document.createTextNode(col));
        els.checkboxGrid.appendChild(wrap);
      }
    }

    function setFieldsFromLine(line) {
      const parts = parseCSVLine(line.trim());
      if (parts.length !== COLUMNS.length) {
        throw new Error(`列数不对。当前解析到 ${parts.length} 列，预期 ${COLUMNS.length} 列。`);
      }
      COLUMNS.forEach((col, idx) => {
        fieldInputs.get(col).value = parts[idx] ?? '';
      });
    }

    function getCurrentRecord() {
      const row = {};
      for (const col of COLUMNS) {
        row[col] = fieldInputs.get(col).value.trim();
      }
      return row;
    }

    function buildDataCSV(row) {
      const header = COLUMNS.join(',');
      const data = COLUMNS.map(col => escapeCSV(row[col])).join(',');
      return header + '\n' + data;
    }

    async function initModel() {
      if (extractor) return extractor;
      setStatus('正在初始化模型，首次下载会比较慢……当前版本默认使用 WASM，避免部分 Mac/WebGPU 环境报错。');
      try {
        extractor = await pipeline('feature-extraction', MODEL_ID, {
          dtype: 'q8',
        });
        setStatus('模型初始化完成。当前使用 WASM（更稳）。', 'ok');
        return extractor;
      } catch (err) {
        const detail = err?.message || String(err);
        throw new Error(`模型初始化失败：${detail}`);
      }
    }

    async function embedText(text) {
      const clean = String(text ?? '').trim();
      if (!clean) return '';
      const out = await extractor(clean, { pooling: 'mean', normalize: true });
      const vector = typeof out.tolist === 'function' ? out.tolist()[0] : Array.from(out.data || []);
      return JSON.stringify(vector);
    }

    async function buildEmbeddingCSV(row) {
      const selected = [];
      for (const [col, cb] of checkboxes.entries()) {
        if (cb.checked) selected.push(col);
      }
      if (!selected.length) throw new Error('至少要勾选一列用于 embedding。');

      const header = ['id', ...selected.map(col => `${col}__embedding`)];
      const values = [escapeCSV(row.id)];

      for (const col of selected) {
        setStatus(`正在生成 embedding：${col}`);
        const vec = await embedText(row[col]);
        values.push(escapeCSV(vec));
      }

      return header.join(',') + '\n' + values.join(',');
    }

    async function copyText(text) {
      await navigator.clipboard.writeText(text);
    }

    renderFields();
    renderCheckboxes();
    els.rawLine.value = EXAMPLE_LINE;
    try { setFieldsFromLine(EXAMPLE_LINE); } catch {}

    els.fillExampleBtn.addEventListener('click', () => {
      els.rawLine.value = EXAMPLE_LINE;
      try {
        setFieldsFromLine(EXAMPLE_LINE);
        setStatus('示例已填入。', 'ok');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    });

    els.parseBtn.addEventListener('click', () => {
      try {
        const line = els.rawLine.value.trim();
        if (!line) throw new Error('请先输入一行 CSV。');
        setFieldsFromLine(line);
        setStatus('解析完成，你现在可以直接修改每个字段。', 'ok');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    });

    els.generateBtn.addEventListener('click', async () => {
      try {
        const row = getCurrentRecord();
        if (!row.id) throw new Error('id 不能为空。');
        els.dataOutput.value = buildDataCSV(row);
        els.embOutput.value = '';
        setStatus('data.csv 已生成，正在生成 embeddings.csv ……');
        await initModel();
        els.embOutput.value = await buildEmbeddingCSV(row);
        setStatus('两个 CSV 记录已生成完成。', 'ok');
      } catch (err) {
        console.error(err);
        const detail = err?.stack ? `${err.message || String(err)}\n\n${err.stack}` : (err?.message || String(err));
        setStatus(detail, 'error');
      }
    });

    els.copyDataBtn.addEventListener('click', async () => {
      try {
        if (!els.dataOutput.value.trim()) throw new Error('还没有生成 data.csv 输出。');
        await copyText(els.dataOutput.value);
        setStatus('已复制 data.csv 输出。', 'ok');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    });

    els.copyEmbBtn.addEventListener('click', async () => {
      try {
        if (!els.embOutput.value.trim()) throw new Error('还没有生成 embeddings.csv 输出。');
        await copyText(els.embOutput.value);
        setStatus('已复制 embeddings.csv 输出。', 'ok');
      } catch (err) {
        setStatus(err.message, 'error');
      }
    });
  </script>
</body>
</html>
