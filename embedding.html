<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>单条数据 Embedding 生成器</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="stylesheet" href="./assets/css/embedding.css" />
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1>单条数据 Embedding 生成器</h1>
      <p>输入一整行 CSV，点“解析”后可以逐字段修改。再点“生成”，页面会输出两段可直接复制的 CSV：一段用于 <code>data.csv</code>，一段用于 <code>embeddings.csv</code>。</p>
    </div>

    <section class="card">
      <h2 class="section-title">1. 输入一行原始数据</h2>
      <label class="label" for="rawLine">格式：id,title,template,relationship,cast_size,logline,location,forbidden_elements,self_check,examples</label>
      <textarea id="rawLine" placeholder='2,电梯里的临时同盟,几名原本互不信任的人被困在____，必须在____之前达成合作。,临时盟友|互相提防,3-5人,用封闭空间强迫人物快速暴露真实立场。,写字楼电梯,血浆|怪物露正脸|长篇回忆杀,每个人在电梯里有没有独立的利益冲突？,https://www.youtube.com/watch?v=3JZ_D3ELwOQ'></textarea>
      <div class="btn-row spaced-top">
        <button class="primary" id="parseBtn">解析</button>
        <button id="fillExampleBtn">填入示例</button>
      </div>
      <div class="tip">如果某个字段本身包含英文逗号，请按标准 CSV 写法用英文双引号包起来。</div>
    </section>

    <section class="card">
      <h2 class="section-title">2. 编辑字段</h2>
      <div class="field-grid" id="fieldGrid"></div>
    </section>

    <section class="card">
      <h2 class="section-title">3. 选择要生成 embedding 的列</h2>
      <div class="checkbox-grid" id="checkboxGrid"></div>
      <div class="tip">默认只勾选：标题、空白模板、角色关系、人数、一句话定义、地点。</div>
    </section>

    <section class="card">
      <h2 class="section-title">4. 生成结果</h2>
      <div class="btn-row">
        <button class="primary" id="generateBtn">生成两个 CSV 记录</button>
        <button id="copyDataBtn">复制 data.csv 记录</button>
        <button id="copyEmbBtn">复制 embeddings.csv 记录</button>
      </div>
      <div id="status" class="status spaced-top">等待操作。</div>
    </section>

    <section class="card">
      <h2 class="section-title">data.csv 输出</h2>
      <textarea id="dataOutput" spellcheck="false"></textarea>
    </section>

    <section class="card">
      <h2 class="section-title">embeddings.csv 输出</h2>
      <textarea id="embOutput" spellcheck="false"></textarea>
    </section>
  </div>
  <script type="module" src="./assets/js/embedding.js"></script>
</body>
</html>
