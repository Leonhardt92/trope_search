<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion 风格语义表格 - CSV 驱动版</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="stylesheet" href="./assets/css/index.css" />
</head>
<body>
  <div class="page">
    <div class="db-shell">
      <div class="db-header">
        <div class="db-title-row">
          <div class="db-title">桥段库</div>
          <div class="db-title-spacer"></div>
          <a class="tool-btn tool-link header-link" href="./embedding.html">↗ Embedding 生成</a>
        </div>
        <div class="db-subtitle">
          点击表头可打开该列菜单并只筛这一列；右上角“属性”可以隐藏或显示列。
          页面启动时会固定读取同目录下的 <span class="mono-inline">data.csv</span> 和 <span class="mono-inline">embeddings.csv</span>，
          不再把数据写在 HTML 常量里。
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <button class="tool-btn" id="searchBtn">⌘ 搜索</button>
          <button class="tool-btn" id="propertiesBtn">☰ 属性</button>
          <button class="tool-btn" id="sortBtn">⇅ 排序</button>
          <button class="tool-btn" id="clearBtn">✕ 清空所有筛选</button>
          <button class="tool-btn" id="reloadBtn">↻ 重新读取 CSV</button>
          <button class="tool-btn primary" id="initBtn">⚡ 初始化模型</button>
        </div>
        <div class="toolbar-right">
          <span class="status" id="status">正在读取 data.csv ...</span>
        </div>
      </div>

      <div class="summary-bar">
        <div class="summary-left">
          <span class="tiny-pill" id="countPill">0/0 条</span>
          <span class="tiny-pill" id="activePill">0 个筛选</span>
          <span class="tiny-pill" id="sortPill">未指定排序列</span>
          <span class="tiny-pill blue" id="devicePill">模型未初始化</span>
        </div>
        <div class="summary-right">
          <span id="hintText">固定读取 data.csv + embeddings.csv；embeddings.csv 需要填入真实向量；语义列：标题 / 空白模板 / 角色关系 / 人数 / 一句话定义 / 地点</span>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="menu-layer" id="menuLayer"></div>
  <script type="module" src="./assets/js/index.js"></script>
</body>
</html>
